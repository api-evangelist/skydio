apis:
  - aid: skydio:skydio-cloud-api
    name: Skydio Cloud API
    description: >-
      The Skydio Cloud API is an HTTP-based REST API with JSON request and
      response bodies that lets developers manage Skydio drone fleets
      programmatically. It covers vehicles, docks, controllers, batteries,
      attachments, and sensor packages; mission templates, scheduled missions,
      mission control, and mission results; flights and telemetry (including
      live telemetry); media files, downloads, thumbnails, and scans; alerts
      and markers; users, external contacts, and distribution lists; webhooks,
      remote video, and media transfer; plus JWT/JWK validation and OpenAPI
      spec endpoints for administration.
    humanURL: https://apidocs.skydio.com/reference/introduction
    tags:
      - Drones
      - Fleet Management
      - Live Telemetry
      - Missions
      - REST API
      - Webhooks
    properties:
      - type: Documentation
        url: https://apidocs.skydio.com/docs
      - type: APIReference
        url: https://apidocs.skydio.com/reference/introduction
      - type: Authentication
        url: https://support.skydio.com/hc/en-us/articles/4402958154651-How-to-Generate-an-API-Token-for-a-Skydio-Cloud-Integration
      - type: GettingStarted
        url: https://apidocs.skydio.com/docs
      - type: Changelog
        url: https://apidocs.skydio.com/changelog
      - type: LLMsTxt
        url: https://apidocs.skydio.com/llms.txt
  - aid: skydio:skydio-control-telemetry-icd
    name: Skydio Control & Telemetry ICD
    description: >-
      Real-time command and control interface for the Skydio X10D using
      MAVLink/RAS-A, enabling integration with ground control stations and
      third-party autonomy stacks. Access is gated through Skydio Support.
    humanURL: https://www.skydio.com/developer-tools
    tags:
      - Defense
      - MAVLink
      - RAS-A
      - Telemetry
    properties:
      - type: ProductPage
        url: https://www.skydio.com/developer-tools
      - type: Support
        url: https://support.skydio.com/
  - aid: skydio:skydio-android-intent-api
    name: Skydio Android Intent API
    description: >-
      Android Intent API for the X10D Controller that lets third-party Android
      applications running on the controller receive information from the
      Skydio flight stack.
    humanURL: https://www.skydio.com/developer-tools
    tags:
      - Android
      - Controller
      - Intent API
    properties:
      - type: ProductPage
        url: https://www.skydio.com/developer-tools
      - type: Support
        url: https://support.skydio.com/
  - aid: skydio:skydio-attachment-icd
    name: Skydio Attachment ICD
    description: >-
      Mechanical, electrical, and power interface specification for building
      custom attachments and payloads for the Skydio X10 and X10D platforms.
      Access requires a request through Skydio.
    humanURL: https://www.skydio.com/developer-tools
    tags:
      - Attachments
      - Hardware
      - Payloads
    properties:
      - type: ProductPage
        url: https://www.skydio.com/developer-tools
      - type: Support
        url: https://support.skydio.com/
