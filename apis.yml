aid: skydio
name: Skydio
description: >-
  Skydio is a U.S. manufacturer of autonomous drones for public safety,
  defense, and enterprise customers, building self-flying aircraft such as the
  X10, X10D, X2, and S2+ along with the Skydio Cloud platform for fleet
  management, mission planning, live telemetry, and media sync. Skydio exposes
  a public REST API through Skydio Cloud (apidocs.skydio.com) for managing
  vehicles, docks, flights, missions, media, alerts, webhooks, and users,
  alongside on-vehicle integration interfaces such as the Control & Telemetry
  ICD, Android Intent API, and Attachment ICD for partners and developers.
kind: company
